# 手工黄金集模板 — RAG 评测
#
# 挑你最关心的面试场景，每条写 query + 期望命中的题目 id。
# query 要用面试官的口语，不能照抄题面。
# must_include_ids: 至少一个要进 top-5
# any_of_ids: 进 top-5 算 soft hit（nDCG 加分）
# forbidden_ids: 不该出现的（可选）
#
# 题目 id 从 MySQL questions 表查，或者跑 python manage.py seed-questions 后看日志。
#
# 用法:
#   python -m eval.rag.run_eval run --label manual_base --no-rerank --golden eval/rag/golden_manual.yaml
#   python -m eval.rag.run_eval run --label manual_rr   --rerank   --golden eval/rag/golden_manual.yaml
#   python -m eval.rag.run_eval compare manual_base manual_rr

